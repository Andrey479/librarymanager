<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Dashboard</title>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="card">
                <div class="card-header">
                    Dashboard
                </div>
                <table class="table">
                    <thead>
                    <tr>
                        <th scope="col">Indice</th>
                        <th scope="col">Quantidade</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <th scope="row">Quantidade total de livros</th>
                        <td th:text="${dashboard.numberOfBooks}">placeholder</td>
                    </tr>
                    <tr>
                        <th scope="row">Quantidade de livros emprestados</th>
                        <td th:text="${dashboard.borrowedBooks}">placeholder</td>
                    </tr>
                    <tr>
                        <th scope="row">Quantidade de emprestimos atrasados</th>
                        <td th:text="${dashboard.overdueLoans}">placeholder</td>
                    </tr>
                    <tr>
                        <th scope="row">Valor total das multas</th>
                        <td th:text="${dashboard.finesValue}">placeholder</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
